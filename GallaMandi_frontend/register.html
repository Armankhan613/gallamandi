<!DOCTYPE html>
<html>
<head>
    <title>Create Account - GallaMandi</title>
    <link rel="stylesheet" href="css/register.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="amazon-register">

    <div class="logo">
        <h1>GallaMandi</h1>
    </div>

    <div class="register-box">
        <h2>Create account</h2>

        <form id="registerForm">

            <label>Your name</label>
            <input type="text" id="name" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Password</label>
            <input type="password" id="password" required>
            <small>Password must be at least 6 characters</small>

            <button type="submit">Create your GallaMandi account</button>

        </form>

        <div class="terms">
            By creating an account, you agree to GallaMandi’s
            <a href="#">Conditions of Use</a> and
            <a href="#">Privacy Notice</a>.
        </div>
    </div>

    <div class="signin-section">
        <hr>
        <p>Already have an account?</p>
        <a href="login.html" class="signin-btn">Sign-In</a>
    </div>

</div>

<script src="js/register.js"></script>
</body>
</html>
